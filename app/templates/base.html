<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }} — Mileage Tracker v3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/app.css">
  <script src="/static/js/theme.js" defer></script>
</head>
<body>
  {% if user is defined and user %}
  <header class="site-header">
    <a href="/" class="brand">Mileage <span>Tracker</span></a>
    <button type="button" class="nav-toggle" id="nav-toggle" aria-label="Open navigation menu" aria-expanded="false" aria-controls="primary-nav">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>
    <nav class="primary-nav" id="primary-nav" aria-label="Main navigation">
      <a href="/" class="nav-link {% if title == 'Dashboard' %}active{% endif %}">Dashboard</a>
      <a href="/trips" class="nav-link {% if title == 'Trips' or 'Trip' in title %}active{% endif %}">Trips</a>
      <a href="/vehicles" class="nav-link {% if title == 'Vehicles' or 'Vehicle' in title %}active{% endif %}">Vehicles</a>
      <a href="/summary" class="nav-link {% if 'summary' in title|lower %}active{% endif %}">Export</a>
    </nav>
    <div class="header-actions">
      <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode" title="Toggle theme">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </button>
      <form method="post" action="/logout" class="inline-form">
        <button type="submit" class="secondary">Log out</button>
      </form>
    </div>
  </header>
  <div class="nav-overlay" id="nav-overlay" aria-hidden="true"></div>
  {% endif %}
  <div class="shell">
    <main class="page-card">
      {% block content %}{% endblock %}
    </main>
  </div>
  <footer class="site-footer">Mileage Tracker v3 — IRS substantiation-grade mileage log</footer>
</body>
</html>
